name: Update referendum data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          set +e
          python scraper.py \
            --output-dir output \
            --concurrency 3 \
            --delay 0.3
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Scraper exited with code $EXIT_CODE"
            echo "scraper_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "scraper_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for CSV output
        id: check_csv
        run: |
          if [ -f "output/referendum_results.csv" ]; then
            echo "csv_exists=true" >> "$GITHUB_OUTPUT"
            echo "CSV found: $(wc -l < output/referendum_results.csv) lines"
          else
            echo "csv_exists=false" >> "$GITHUB_OUTPUT"
            echo "::error::No CSV output found"
          fi

      - name: Rebuild site data
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          python prepare_site.py \
            --csv output/referendum_results.csv \
            --output-dir docs/data \
            --geojson docs/data/italy.geojson

      - name: Copy CSV for download
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: cp output/referendum_results.csv docs/data/referendum_results.csv

      - name: Commit and push
        if: steps.check_csv.outputs.csv_exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/referendum_results.csv docs/data/

          if git diff --staged --quiet; then
            echo "No changes to commit — data unchanged"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M)
            git commit -m "Update referendum data [$TIMESTAMP]"
            git pull --rebase origin main
            git push
            echo "Pushed updated data"
          fi
